name: PR Staging Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

env:
  # Production ACR to reuse (avoids duplicate registry costs)
  ACR_NAME: ${{ vars.ACR_NAME || 'crgvojq4dgzbtk4' }}
  ACR_RESOURCE_GROUP: ${{ vars.ACR_RESOURCE_GROUP || 'rg-teamskills-prod' }}
  STAGING_RESOURCE_GROUP: rg-teamskills-staging
  LOCATION: centralus

jobs:
  deploy-staging:
    name: Deploy PR Staging Environment
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: staging
    
    outputs:
      frontend_url: ${{ steps.deploy.outputs.frontendUrl }}
      backend_url: ${{ steps.deploy.outputs.backendUrl }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment variables
        id: setup
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        run: |
          docker build -f Dockerfile.backend \
            -t ${{ env.ACR_NAME }}.azurecr.io/backend:${{ steps.setup.outputs.image_tag }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:${{ steps.setup.outputs.image_tag }}

      - name: Build and push frontend image
        run: |
          # No VITE_API_URL needed at build time — injected at runtime by docker-entrypoint.sh
          docker build -f Dockerfile.frontend \
            -t ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ steps.setup.outputs.image_tag }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ steps.setup.outputs.image_tag }}

      - name: Generate PostgreSQL password
        id: pg_password
        run: |
          PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24)
          echo "::add-mask::${PASSWORD}"
          echo "password=${PASSWORD}" >> $GITHUB_OUTPUT

      - name: Wake up Postgres if stopped
        run: |
          PR_NUMBER=${{ steps.setup.outputs.pr_number }}
          SERVER_NAME="psql-staging-pr${PR_NUMBER}"
          RG="${{ env.STAGING_RESOURCE_GROUP }}"
          
          # Check if server exists and is stopped
          STATE=$(az postgres flexible-server show \
            --name "$SERVER_NAME" --resource-group "$RG" \
            --query "state" -o tsv 2>/dev/null || echo "NotFound")
          
          if [ "$STATE" = "Stopped" ]; then
            echo "Postgres server is stopped — starting it..."
            az postgres flexible-server start --name "$SERVER_NAME" --resource-group "$RG"
            echo "✅ Postgres server started"
          elif [ "$STATE" = "NotFound" ]; then
            echo "No existing Postgres server — Bicep will create it"
          else
            echo "Postgres server state: $STATE"
          fi

      - name: Deploy staging infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.STAGING_RESOURCE_GROUP }}
          template: ./infra/staging/main.bicep
          parameters: >
            prNumber=${{ steps.setup.outputs.pr_number }}
            postgresPassword=${{ steps.pg_password.outputs.password }}
            imageTag=${{ steps.setup.outputs.image_tag }}
            acrName=${{ env.ACR_NAME }}
            acrResourceGroup=${{ env.ACR_RESOURCE_GROUP }}
            location=${{ env.LOCATION }}
          failOnStdErr: false

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend to be ready..."
          BACKEND_URL="${{ steps.deploy.outputs.backendUrl }}"
          for i in {1..30}; do
            if curl -s "${BACKEND_URL}/health" | grep -q "ok"; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i: Backend not ready yet, waiting..."
            sleep 10
          done

      - name: Initialize database with seed data
        run: |
          BACKEND_URL="${{ steps.deploy.outputs.backendUrl }}"
          INIT_SECRET="${{ steps.deploy.outputs.initSecret }}"
          
          echo "Initializing database..."
          HTTP_CODE=$(curl -s -o /tmp/init_response.json -w "%{http_code}" -X POST "${BACKEND_URL}/api/admin/init" \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"${INIT_SECRET}\"}")
          RESPONSE=$(cat /tmp/init_response.json 2>/dev/null || echo "")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Database initialized successfully"
          elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "⚠️  Easy Auth blocked DB init (HTTP ${HTTP_CODE}) — DB may already be seeded"
          else
            echo "⚠️  DB init returned HTTP ${HTTP_CODE}"
          fi
          echo "Response: ${RESPONSE}"

      - name: Set Application ID URI for staging app
        run: |
          STAGING_APP_ID="${{ steps.deploy.outputs.stagingAppId }}"
          if [ -n "$STAGING_APP_ID" ]; then
            az ad app update --id "$STAGING_APP_ID" \
              --identifier-uris "api://$STAGING_APP_ID"
            echo "✅ Set identifier URI: api://$STAGING_APP_ID"
          else
            echo "⚠️ No staging app ID output — skipping identifier URI setup"
          fi

      - name: Configure OBO for SharePoint sync
        id: obo_setup
        run: |
          STAGING_APP_ID="${{ steps.deploy.outputs.stagingAppId }}"
          PR_NUMBER="${{ steps.setup.outputs.pr_number }}"
          RESOURCE_TOKEN="pr${PR_NUMBER}"
          
          if [ -z "$STAGING_APP_ID" ]; then
            echo "⚠️ No staging app ID — skipping OBO setup"
            echo "client_secret=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Create a client secret for OBO flow
          echo "Creating client secret for OBO..."
          SECRET_JSON=$(az ad app credential reset \
            --id "$STAGING_APP_ID" \
            --display-name "OBO Staging Secret" \
            --years 1 \
            --query password -o tsv 2>/dev/null || echo "")
          
          if [ -z "$SECRET_JSON" ]; then
            echo "⚠️ Failed to create client secret — OBO sync will be disabled"
            echo "client_secret=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "::add-mask::${SECRET_JSON}"
          echo "client_secret=${SECRET_JSON}" >> $GITHUB_OUTPUT
          echo "✅ Client secret created"
          
          # Grant admin consent for Sites.ReadWrite.All
          echo "Granting admin consent for Graph permissions..."
          SP_ID=$(az ad sp show --id "$STAGING_APP_ID" --query id -o tsv 2>/dev/null || echo "")
          if [ -z "$SP_ID" ]; then
            az ad sp create --id "$STAGING_APP_ID" > /dev/null 2>&1
          fi
          az ad app permission admin-consent --id "$STAGING_APP_ID" 2>/dev/null || \
            echo "⚠️ Admin consent may require manual grant"
          echo "✅ Admin consent granted (or already granted)"

      - name: Update backend with OBO client secret
        if: steps.obo_setup.outputs.client_secret != ''
        run: |
          PR_NUMBER="${{ steps.setup.outputs.pr_number }}"
          RESOURCE_TOKEN="pr${PR_NUMBER}"
          CLIENT_SECRET="${{ steps.obo_setup.outputs.client_secret }}"
          
          echo "Adding AZURE_AD_CLIENT_SECRET to backend container..."
          az containerapp secret set \
            --name "ca-backend-${RESOURCE_TOKEN}" \
            --resource-group "${{ env.STAGING_RESOURCE_GROUP }}" \
            --secrets "obo-client-secret=${CLIENT_SECRET}" \
            --output none
          
          az containerapp update \
            --name "ca-backend-${RESOURCE_TOKEN}" \
            --resource-group "${{ env.STAGING_RESOURCE_GROUP }}" \
            --set-env-vars "AZURE_AD_CLIENT_SECRET=secretref:obo-client-secret" \
            --output none
          
          echo "✅ Backend updated with OBO client secret"

      - name: Smoke test staging deployment
        run: |
          FRONTEND_URL="${{ steps.deploy.outputs.frontendUrl }}"
          BACKEND_URL="${{ steps.deploy.outputs.backendUrl }}"
          
          echo "=== Smoke Test: Backend Health ==="
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BACKEND_URL}/health")
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Backend health OK (HTTP 200)"
          elif [ "$HEALTH_STATUS" = "401" ] || [ "$HEALTH_STATUS" = "302" ]; then
            echo "✅ Backend is alive (HTTP ${HEALTH_STATUS} — Easy Auth is active)"
          else
            echo "❌ Backend health check failed (HTTP ${HEALTH_STATUS})"
            exit 1
          fi
          
          echo "=== Smoke Test: Frontend Accessible ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FRONTEND_URL}")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "401" ]; then
            echo "✅ Frontend accessible (HTTP ${HTTP_STATUS})"
          else
            echo "❌ Frontend returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          
          echo "=== Smoke Test: Runtime Config ==="
          CONFIG_STATUS=$(curl -s -o /tmp/config_response.txt -w "%{http_code}" "${FRONTEND_URL}/config.js")
          CONFIG=$(cat /tmp/config_response.txt 2>/dev/null || echo "")
          if [ "$CONFIG_STATUS" = "401" ] || [ "$CONFIG_STATUS" = "302" ]; then
            echo "⚠️  Easy Auth blocked /config.js (HTTP ${CONFIG_STATUS}) — skipping config validation"
          elif [ -z "$CONFIG" ] || [ "$CONFIG_STATUS" != "200" ]; then
            echo "❌ Could not fetch /config.js (HTTP ${CONFIG_STATUS})"
            exit 1
          else
            echo "config.js contents:"
            echo "$CONFIG"
            
            if echo "$CONFIG" | grep -q 'VITE_API_URL: ""'; then
              echo "❌ VITE_API_URL is empty in config.js — runtime injection failed!"
              exit 1
            fi
            
            if ! echo "$CONFIG" | grep -q "azurecontainerapps.io"; then
              echo "❌ VITE_API_URL does not contain expected domain!"
              exit 1
            fi
            echo "✅ Runtime config looks correct"
          fi
          
          echo "=== Smoke Test: Frontend can reach backend ==="
          if [ -n "$CONFIG" ] && echo "$CONFIG" | grep -q "VITE_API_URL"; then
            API_URL=$(echo "$CONFIG" | grep VITE_API_URL | sed 's/.*"\(https[^"]*\)".*/\1/')
            CROSS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health")
            if [ "$CROSS_STATUS" = "200" ] || [ "$CROSS_STATUS" = "401" ] || [ "$CROSS_STATUS" = "302" ]; then
              echo "✅ Frontend's configured API URL is reachable (HTTP ${CROSS_STATUS})"
            else
              echo "⚠️  Could not reach backend via frontend's configured URL (HTTP ${CROSS_STATUS})"
            fi
          else
            echo "⚠️  Skipping cross-connectivity check (config.js not available)"
          fi
          
          echo "=== All smoke tests passed! ==="

      - name: Comment on PR with staging URLs
        uses: actions/github-script@v7
        with:
          script: |
            const frontendUrl = '${{ steps.deploy.outputs.frontendUrl }}';
            const backendUrl = '${{ steps.deploy.outputs.backendUrl }}';
            const prNumber = ${{ steps.setup.outputs.pr_number }};
            const sha = '${{ github.sha }}';
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const stagingComment = comments.data.find(c => 
              c.body.includes('🚀 **PR Staging Environment**') && 
              c.user.type === 'Bot'
            );
            
            const body = `🚀 **PR Staging Environment**

            | Resource | URL |
            |----------|-----|
            | **Frontend** | ${frontendUrl} |
            | **Backend** | ${backendUrl} |
            | **Health Check** | ${backendUrl}/health |

            **Commit:** \`${sha.substring(0, 7)}\`
            **Status:** ✅ Deployed

            > This environment will be automatically destroyed when the PR is closed or merged.
            `;
            
            if (stagingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: stagingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

      - name: Deployment summary
        run: |
          echo "## 🚀 PR Staging Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ steps.deploy.outputs.frontendUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend** | ${{ steps.deploy.outputs.backendUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
