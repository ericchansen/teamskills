name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint
        continue-on-error: false

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
        continue-on-error: false

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teamskills_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend tests
        run: npm run test:backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teamskills_test
          NODE_ENV: test

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        uses: azure/setup-azd@v2

      - name: Log in to Azure (azd)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Configure azd environment
        run: |
          # Create or select production environment (must match existing rg-prod resources)
          azd env new prod --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" --location centralus || azd env select prod
          
          # Set environment variables needed by Bicep parameters
          azd env set AZURE_ENV_NAME prod
          azd env set AZURE_LOCATION centralus
          azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_AD_CLIENT_ID "${{ vars.AZURE_AD_CLIENT_ID }}"
          azd env set AZURE_AD_TENANT_ID "${{ vars.AZURE_AD_TENANT_ID }}"
          azd env set AZURE_POSTGRES_PASSWORD "${{ secrets.POSTGRES_PASSWORD }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt

      - name: Smoke test - Validate auth configuration
        run: |
          # Get deployed URLs from azd environment outputs (populated by azd provision)
          FRONTEND_URL=$(azd env get-value FRONTEND_URI 2>/dev/null || echo "")
          BACKEND_URL=$(azd env get-value BACKEND_URI 2>/dev/null || echo "")
          
          # Fallback: discover from Azure if azd outputs aren't available
          if [ -z "$FRONTEND_URL" ] || [ -z "$BACKEND_URL" ]; then
            RG=$(azd env get-value AZURE_RESOURCE_GROUP 2>/dev/null || echo "rg-prod")
            FRONTEND_URL="https://$(az containerapp show -n $(az containerapp list -g "$RG" --query "[?contains(name,'frontend')].name" -o tsv) -g "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)"
            BACKEND_URL="https://$(az containerapp show -n $(az containerapp list -g "$RG" --query "[?contains(name,'backend')].name" -o tsv) -g "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)"
          fi

          echo "Frontend: $FRONTEND_URL"
          echo "Backend: $BACKEND_URL"

          echo "=== Smoke Test: Auth Config ==="
          AUTH_CONFIG=$(curl -sf "${BACKEND_URL}/api/auth/config" || echo "{}")
          echo "Auth config: ${AUTH_CONFIG}"

          if ! echo "$AUTH_CONFIG" | grep -q '"clientId"'; then
            echo "❌ Auth config missing clientId!"
            exit 1
          fi

          if ! echo "$AUTH_CONFIG" | grep -q '"tenantId"'; then
            echo "❌ Auth config missing tenantId!"
            exit 1
          fi

          echo "=== Smoke Test: Frontend Config ==="
          CONFIG=$(curl -sf "${FRONTEND_URL}/config.js" || echo "")
          echo "config.js: ${CONFIG}"

          if echo "$CONFIG" | grep -q 'VITE_AZURE_AD_CLIENT_ID: ""'; then
            echo "❌ VITE_AZURE_AD_CLIENT_ID is empty!"
            exit 1
          fi

          if echo "$CONFIG" | grep -q 'VITE_AZURE_AD_TENANT_ID: ""'; then
            echo "❌ VITE_AZURE_AD_TENANT_ID is empty!"
            exit 1
          fi

          echo "✅ Auth configuration verified!"

          # Export URLs for summary step
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      - name: Deployment summary
        run: |
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** ${{ env.BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Method:** Azure Developer CLI (azd)" >> $GITHUB_STEP_SUMMARY
