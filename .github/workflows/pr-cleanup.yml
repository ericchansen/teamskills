name: PR Staging Cleanup

on:
  pull_request:
    types: [closed]
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

env:
  STAGING_RESOURCE_GROUP: rg-teamskills-staging

jobs:
  cleanup-staging:
    name: Cleanup PR Staging Environment
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Setup environment variables
        id: setup
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Delete staging app registration
        run: |
          PR_NUMBER=${{ steps.setup.outputs.pr_number }}
          APP_UNIQUE_NAME="teamskills-staging-pr${PR_NUMBER}"
          
          # Find app by display name pattern (uniqueName is internal to Bicep)
          APP_ID=$(az ad app list --display-name "Team Skills Tracker (Staging PR${PR_NUMBER})" --query "[0].appId" -o tsv 2>/dev/null)
          if [ -n "$APP_ID" ]; then
            az ad app delete --id "$APP_ID"
            echo "✅ Deleted staging app registration: Team Skills Tracker (Staging PR${PR_NUMBER})"
          else
            echo "ℹ️ No staging app registration found for PR #${PR_NUMBER}"
          fi

      - name: Delete PR staging resources
        id: cleanup
        run: |
          PR_NUMBER=${{ steps.setup.outputs.pr_number }}
          RG="${{ env.STAGING_RESOURCE_GROUP }}"
          DELETED=0

          echo "Cleaning up staging resources for PR #${PR_NUMBER} in ${RG}..."

          # Delete Container Apps first (they depend on the environment)
          for APP in $(az containerapp list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null); do
            echo "Deleting Container App: ${APP}"
            az containerapp delete -g "$RG" -n "$APP" --yes
            DELETED=$((DELETED + 1))
          done

          # Wait for container app deletions to fully process
          echo "Waiting 30s for container app deletions to complete..."
          sleep 30

          # Delete Container Apps Environment
          for ENV in $(az containerapp env list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null); do
            echo "Deleting Container Apps Environment: ${ENV}"
            az containerapp env delete -g "$RG" -n "$ENV" --yes
            DELETED=$((DELETED + 1))
          done

          # Delete PostgreSQL Flexible Server (synchronous, no --no-wait needed)
          for PG in $(az postgres flexible-server list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null); do
            echo "Deleting PostgreSQL server: ${PG}"
            az postgres flexible-server delete -g "$RG" -n "$PG" --yes
            DELETED=$((DELETED + 1))
          done

          # Delete Log Analytics Workspace
          for LOG in $(az monitor log-analytics workspace list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null); do
            echo "Deleting Log Analytics workspace: ${LOG}"
            az monitor log-analytics workspace delete -g "$RG" -n "$LOG" --yes --force
            DELETED=$((DELETED + 1))
          done

          echo "deleted_count=${DELETED}" >> $GITHUB_OUTPUT
          echo "Cleanup complete. Deleted ${DELETED} resources."

      - name: Verify cleanup
        run: |
          PR_NUMBER=${{ steps.setup.outputs.pr_number }}
          RG="${{ env.STAGING_RESOURCE_GROUP }}"
          
          echo "Verifying all PR #${PR_NUMBER} resources are deleted..."
          
          # Count remaining resources with the PR tag
          REMAINING_APPS=$(az containerapp list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null | wc -l)
          REMAINING_ENVS=$(az containerapp env list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null | wc -l)
          REMAINING_PG=$(az postgres flexible-server list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null | wc -l)
          REMAINING_LOGS=$(az monitor log-analytics workspace list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}'].name" -o tsv 2>/dev/null | wc -l)
          
          TOTAL_REMAINING=$((REMAINING_APPS + REMAINING_ENVS + REMAINING_PG + REMAINING_LOGS))
          
          if [ $TOTAL_REMAINING -gt 0 ]; then
            echo "❌ CLEANUP VERIFICATION FAILED"
            echo "Found $TOTAL_REMAINING orphaned resources:"
            echo "  - Container Apps: $REMAINING_APPS"
            echo "  - Container App Environments: $REMAINING_ENVS"
            echo "  - PostgreSQL Servers: $REMAINING_PG"
            echo "  - Log Analytics Workspaces: $REMAINING_LOGS"
            exit 1
          else
            echo "✅ Cleanup verified: All PR #${PR_NUMBER} resources successfully deleted"
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.setup.outputs.pr_number }};
            const merged = ${{ github.event.pull_request.merged }};
            const status = merged ? '🎉 Merged' : '❌ Closed';
            const deletedCount = '${{ steps.cleanup.outputs.deleted_count }}';
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const stagingComment = comments.data.find(c => 
              c.body.includes('🚀 **PR Staging Environment**') && 
              c.user.type === 'Bot'
            );
            
            if (stagingComment) {
              const body = `🚀 **PR Staging Environment**

              **Status:** 🗑️ Destroyed (${deletedCount} resources removed)

              The staging environment for this PR has been cleaned up.
              PR was ${status.toLowerCase()}.
              `;
              
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: stagingComment.id,
                body: body
              });
            }

      - name: Cleanup summary
        run: |
          echo "## 🗑️ PR Staging Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deleted **${{ steps.cleanup.outputs.deleted_count }}** resources for PR #${{ steps.setup.outputs.pr_number }} from **${{ env.STAGING_RESOURCE_GROUP }}**." >> $GITHUB_STEP_SUMMARY
