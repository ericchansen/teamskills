name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint
        continue-on-error: false

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
        continue-on-error: false

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teamskills_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend tests
        run: npm run test:backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teamskills_test
          NODE_ENV: test

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production
    
    # Deploy using direct Azure CLI instead of azd.
    # Reason: Production infrastructure is brownfield (created incrementally, not by azd).
    # azd provision generates a resourceToken from AZURE_ENV_NAME that creates NEW resources
    # instead of updating existing ones. Direct CLI targets the exact existing resources.
    # See .squad/decisions/inbox/mcmanus-cicd-direct-cli.md for full rationale.
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Build and push backend image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME || 'crgvojq4dgzbtk4' }} \
            --image backend:${{ github.sha }} \
            --image backend:latest \
            --file Dockerfile.backend \
            .

      - name: Build and push frontend image
        run: |
          BACKEND_URL="https://$(az containerapp show \
            --name ${{ vars.BACKEND_APP || 'ca-backend-gvojq4dgzbtk4' }} \
            --resource-group ${{ vars.RESOURCE_GROUP || 'rg-teamskills-prod' }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)"

          az acr build \
            --registry ${{ vars.ACR_NAME || 'crgvojq4dgzbtk4' }} \
            --image frontend:${{ github.sha }} \
            --image frontend:latest \
            --file Dockerfile.frontend \
            --build-arg VITE_API_URL=$BACKEND_URL \
            --build-arg VITE_AZURE_AD_CLIENT_ID=${{ vars.AZURE_AD_CLIENT_ID }} \
            --build-arg VITE_AZURE_AD_TENANT_ID=${{ vars.AZURE_AD_TENANT_ID }} \
            .

      - name: Deploy backend
        run: |
          az containerapp update \
            --name ${{ vars.BACKEND_APP || 'ca-backend-gvojq4dgzbtk4' }} \
            --resource-group ${{ vars.RESOURCE_GROUP || 'rg-teamskills-prod' }} \
            --image ${{ vars.ACR_NAME || 'crgvojq4dgzbtk4' }}.azurecr.io/backend:${{ github.sha }} \
            --set-env-vars \
              AZURE_AD_CLIENT_ID=${{ vars.AZURE_AD_CLIENT_ID }} \
              AZURE_AD_TENANT_ID=${{ vars.AZURE_AD_TENANT_ID }} \
              NODE_ENV=production

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_APP || 'ca-frontend-teamskills' }} \
            --resource-group ${{ vars.RESOURCE_GROUP || 'rg-teamskills-prod' }} \
            --image ${{ vars.ACR_NAME || 'crgvojq4dgzbtk4' }}.azurecr.io/frontend:${{ github.sha }}

      - name: Wait for new revisions to provision
        run: |
          RG="${{ vars.RESOURCE_GROUP || 'rg-teamskills-prod' }}"
          BACKEND_APP="${{ vars.BACKEND_APP || 'ca-backend-gvojq4dgzbtk4' }}"

          BACKEND_URL="https://$(az containerapp show -n "$BACKEND_APP" -g "$RG" --query 'properties.configuration.ingress.fqdn' -o tsv)"

          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf "${BACKEND_URL}/health" | grep -q '"ok"'; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "Attempt $i/30: Backend not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Smoke test - Validate auth configuration
        run: |
          RG="${{ vars.RESOURCE_GROUP || 'rg-teamskills-prod' }}"
          BACKEND_APP="${{ vars.BACKEND_APP || 'ca-backend-gvojq4dgzbtk4' }}"
          FRONTEND_APP="${{ vars.FRONTEND_APP || 'ca-frontend-teamskills' }}"

          BACKEND_URL="https://$(az containerapp show -n "$BACKEND_APP" -g "$RG" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          FRONTEND_URL="https://$(az containerapp show -n "$FRONTEND_APP" -g "$RG" --query 'properties.configuration.ingress.fqdn' -o tsv)"

          echo "Frontend: $FRONTEND_URL"
          echo "Backend: $BACKEND_URL"

          echo "=== Smoke Test: Health Check ==="
          HEALTH=$(curl -sf "${BACKEND_URL}/health" || echo '{"status":"unreachable"}')
          echo "Health: ${HEALTH}"
          if ! echo "$HEALTH" | grep -q '"ok"'; then
            echo "❌ Backend health check failed!"
            exit 1
          fi

          echo "=== Smoke Test: Auth Config ==="
          AUTH_CONFIG=$(curl -sf "${BACKEND_URL}/api/auth/config" || echo "{}")
          echo "Auth config: ${AUTH_CONFIG}"

          if ! echo "$AUTH_CONFIG" | grep -q '"clientId"'; then
            echo "❌ Auth config missing clientId!"
            exit 1
          fi

          if ! echo "$AUTH_CONFIG" | grep -q '"tenantId"'; then
            echo "❌ Auth config missing tenantId!"
            exit 1
          fi

          echo "=== Smoke Test: Frontend Config ==="
          CONFIG=$(curl -sf "${FRONTEND_URL}/config.js" || echo "")
          echo "config.js: ${CONFIG}"

          if echo "$CONFIG" | grep -q 'VITE_AZURE_AD_CLIENT_ID: ""'; then
            echo "❌ VITE_AZURE_AD_CLIENT_ID is empty!"
            exit 1
          fi

          if echo "$CONFIG" | grep -q 'VITE_AZURE_AD_TENANT_ID: ""'; then
            echo "❌ VITE_AZURE_AD_TENANT_ID is empty!"
            exit 1
          fi

          echo "✅ Auth configuration verified!"

          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      - name: Deployment summary
        run: |
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** ${{ env.BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Method:** Direct Azure CLI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Variables (override defaults via repo settings)" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Default |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`RESOURCE_GROUP\` | \`rg-teamskills-prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ACR_NAME\` | \`crgvojq4dgzbtk4\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`BACKEND_APP\` | \`ca-backend-gvojq4dgzbtk4\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`FRONTEND_APP\` | \`ca-frontend-teamskills\` |" >> $GITHUB_STEP_SUMMARY
