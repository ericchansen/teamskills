name: PR Staging Cleanup

on:
  pull_request:
    types: [closed]
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

env:
  STAGING_RESOURCE_GROUP: rg-teamskills-staging

jobs:
  cleanup-staging:
    name: Cleanup PR Staging Environment
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Setup environment variables
        id: setup
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Scale down staging and stop Postgres
        id: cleanup
        run: |
          RG="${{ env.STAGING_RESOURCE_GROUP }}"
          ACTIONS=0

          echo "Scaling down staging resources..."

          # Scale Container Apps to 0 replicas
          for APP in ca-frontend-staging ca-backend-staging; do
            if az containerapp show -g "$RG" -n "$APP" &>/dev/null; then
              echo "Scaling $APP to 0 replicas..."
              az containerapp update -g "$RG" -n "$APP" --min-replicas 0 --max-replicas 0 2>/dev/null || true
              ACTIONS=$((ACTIONS + 1))
            fi
          done

          # Stop PostgreSQL server to save costs
          SERVER_NAME="psql-teamskills-staging"
          STATE=$(az postgres flexible-server show \
            --name "$SERVER_NAME" --resource-group "$RG" \
            --query "state" -o tsv 2>/dev/null || echo "NotFound")
          
          if [ "$STATE" = "Ready" ]; then
            echo "Stopping Postgres server..."
            az postgres flexible-server stop --name "$SERVER_NAME" --resource-group "$RG" --no-wait
            ACTIONS=$((ACTIONS + 1))
            echo "✅ Postgres server stop initiated"
          elif [ "$STATE" = "NotFound" ]; then
            echo "No Postgres server found"
          else
            echo "Postgres server state: $STATE"
          fi

          # Also clean up any leftover per-PR resources from previous approach
          PR_NUMBER=${{ steps.setup.outputs.pr_number }}
          for APP in $(az containerapp list -g "$RG" --query "[?tags.\"pr-number\"=='${PR_NUMBER}' && contains(name, 'pr${PR_NUMBER}')].name" -o tsv 2>/dev/null); do
            echo "Deleting legacy per-PR Container App: ${APP}"
            az containerapp delete -g "$RG" -n "$APP" --yes --no-wait
            ACTIONS=$((ACTIONS + 1))
          done

          echo "action_count=${ACTIONS}" >> $GITHUB_OUTPUT
          echo "Cleanup complete. ${ACTIONS} actions taken."

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.setup.outputs.pr_number }};
            const merged = ${{ github.event.pull_request.merged }};
            const status = merged ? '🎉 Merged' : '❌ Closed';
            const actionCount = '${{ steps.cleanup.outputs.action_count }}';
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const stagingComment = comments.data.find(c => 
              c.body.includes('🚀 **PR Staging Environment**') && 
              c.user.type === 'Bot'
            );
            
            if (stagingComment) {
              const body = `🚀 **PR Staging Environment**

              **Status:** 💤 Scaled down (${actionCount} actions taken)

              The staging environment has been scaled to zero and Postgres stopped.
              Resources are preserved for reuse by the next PR.
              PR was ${status.toLowerCase()}.
              `;
              
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: stagingComment.id,
                body: body
              });
            }

      - name: Cleanup summary
        run: |
          echo "## 💤 PR Staging Scaled Down" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Took **${{ steps.cleanup.outputs.action_count }}** actions for PR #${{ steps.setup.outputs.pr_number }} in **${{ env.STAGING_RESOURCE_GROUP }}**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resources preserved for reuse. Postgres stopped to save costs." >> $GITHUB_STEP_SUMMARY
